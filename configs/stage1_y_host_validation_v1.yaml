schema_version: "1.0"

run:
  run_id: "20260302_Y_stage1_dft_001"
  stage: "stage1"
  system: "Y"
  method: "dft"
  objective: "Converge alpha-Y host bulk energy with respect to ENCUT and k-point density."

structure:
  phase: "alpha_hcp"
  source:
    kind: "prototype"
    reference: "hcp alpha-Y prototype cell (document exact origin before execution)."
  supercell: [4, 4, 3]

vasp:
  functional: "PBE"
  precision: "Accurate"
  encut_eV: 520
  kpoints_grid: [12, 12, 8]
  kpoints_offset: [0.0, 0.0, 0.0]
  ismear: 1
  sigma_eV: 0.2
  ediff: 1.0e-6
  ediffg: -0.02
  nsw: 200
  isif: 3
  ibrion: 2
  lasph: true
  lreal: "Auto"
  spin_polarized: false

convergence_scan:
  encut_values_eV: [400, 450, 520, 600]
  kpoint_grids:
    - [8, 8, 6]
    - [10, 10, 6]
    - [12, 12, 8]
  tolerance_meV_per_atom: 1.0

hpc:
  scheduler: "slurm"
  nodes: 1
  ntasks: 32
  walltime: "08:00:00"
  partition: "<partition>"
  account: "<account>"

outputs:
  results_root: "results/runs"
  write_manifest: true
  write_metrics: true
  write_report_html: true

provenance:
  potcar_labels: ["Y_sv"]
  notes:
    - "Stage-1 host-only validation config."
    - "Replace placeholder partition/account before submission."
